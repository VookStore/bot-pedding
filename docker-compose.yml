version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vook-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_postgres_password_here
      POSTGRES_DB: vook_tickets
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vook_tickets"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vook-bot
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:your_postgres_password_here@postgres:5432/vook_tickets?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - transcripts:/usr/src/app/data/transcripts

volumes:
  pgdata:
    driver: local
  transcripts:
    driver: local
